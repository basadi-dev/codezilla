# .github/workflows/release-binaries.yml
name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output_name: codezilla-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            output_name: codezilla-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output_name: codezilla-windows.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/codezilla.exe ${{ matrix.output_name }}
          else
            cp target/${{ matrix.target }}/release/codezilla ${{ matrix.output_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: ${{ matrix.output_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/codezilla-linux/codezilla-linux
            ./artifacts/codezilla-macos/codezilla-macos
            ./artifacts/codezilla-windows.exe/codezilla-windows.exe
          draft: false
          prerelease: false
          generate_release_notes: true