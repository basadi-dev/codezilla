# .github/workflows/release.yml
name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-version:
    name: Verify tag matches crate version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract crate version
        id: crate
        run: |
          CRATE_VER=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$CRATE_VER" >> "$GITHUB_OUTPUT"

      - name: Compare with git tag
        run: |
          TAG_VER=${GITHUB_REF#refs/tags/v}
          CRATE_VER="${{ steps.crate.outputs.version }}"
          echo "Tag version:   $TAG_VER"
          echo "Crate version: $CRATE_VER"
          [ "$CRATE_VER" = "$TAG_VER" ] || { echo "::error::Tag v$TAG_VER does not match crate version $CRATE_VER"; exit 1; }

  build:
    name: Build ${{ matrix.target }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output_name: codezilla-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            output_name: codezilla-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output_name: codezilla-windows.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          TAG_VER=${GITHUB_REF#refs/tags/v}
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/codezilla.exe codezilla-${TAG_VER}-windows.exe
          else
            EXT="${{ matrix.output_name }}"
            # Strip the "codezilla-" prefix and re-add with version
            BASE="codezilla-${TAG_VER}-$(echo "$EXT" | sed 's/^codezilla-//')"
            cp target/${{ matrix.target }}/release/codezilla "$BASE"
            echo "renamed_to=$BASE" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: codezilla-*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/codezilla-linux/codezilla-*
            ./artifacts/codezilla-macos/codezilla-*
            ./artifacts/codezilla-windows.exe/codezilla-*
          draft: false
          prerelease: false
          generate_release_notes: true