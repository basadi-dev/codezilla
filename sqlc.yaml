version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/sql"
    schema: "internal/db/sql/schema.sql"
    gen:
      go:
        package: "generated"
        out: "internal/db/generated"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "datetime"
            go_type: "time.Time"
          - db_type: "DATETIME"
            go_type: "time.Time"
