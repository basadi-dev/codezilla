# Codezilla Configuration
# Loaded from ./config.yaml (project root) or ~/.config/codezilla/config.yaml
# Override location: codezilla -config /path/to/config.yaml

# Model selection
model_settings:
  model_id: "deepseek-v4-pro:cloud"
  provider_id: "ollama"
  # reasoning_effort: "medium"   # low | medium | high  (Anthropic / OpenAI o-series only)

# Model presets shown in the /model autocomplete list.
# Format: model_id + provider_id required; reasoning_effort optional.
models:
  - model_id: "glm-5.1:cloud"
    provider_id: "ollama"
    context_window: 198000
  - model_id: "qwen3-coder-next:cloud"
    provider_id: "ollama"
    context_window: 256000
  - model_id: "kimi-k2.6:cloud"
    provider_id: "ollama"
    context_window: 256000
  - model_id: "deepseek-v4-flash:cloud"
    provider_id: "ollama"
    context_window: 1000000
  - model_id: "deepseek-v4-pro:cloud"
    provider_id: "ollama"
    context_window: 1000000
  - model_id: "claude-opus-4-5"
    provider_id: "anthropic"
    reasoning_effort: "medium"

# LLM connection settings (API keys, provider URLs)
# API keys can also be set via environment variables:
#   OLLAMA_API_KEY, OLLAMA_BASE_URL, OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY
llm:
  ollama:
    base_url: "https://ollama.com"
    auth_type: "bearer"   # bearer | basic
    # username: ""
    # password: ""
  # openai:
  #   base_url: "https://api.openai.com/v1"
  # api_keys:
  #   ollama: ""
  #   openai: ""
  #   anthropic: ""
  #   gemini: ""

system_prompt: |
  You are Codezilla, an expert AI coding assistant. Read fast, decide fast, act fast.

  ## Action discipline (most important)
  - Every response that describes an action MUST emit the matching tool call in the same response. No "I'll read X" or "let me check Y" without the actual call.
  - Do NOT re-read a file you've already read this turn — refer back to the prior tool result.
  - Do NOT restate what a tool just showed you. Use the information.
  - Stop exploring once you can act. Reading every adjacent file is stalling, not preparation. The repo map at turn start already tells you the file tree and top-level symbols.
  - Multiple independent calls (e.g. reading two unrelated files) should go in one response as parallel tool calls, not sequential rounds.

  ## Editing code
  - Prefer `patch_file` over `write_file` for changes to existing files. Read the target lines first to confirm line numbers, then patch them with `start_line`, `end_line`, and the replacement `content`.
  - Use `write_file` only for new files or full rewrites.

  ## Running commands
  - Use `bash_exec` for any shell command — pipes, redirects, globs, `&&`, `2>&1` all work because it goes through bash.
  - Use `shell_exec` only when you need raw argv with no shell expansion.
  - macOS sed: `sed -i ''` (empty backup suffix required).

  ## Output
  - Reply in markdown. Be concise.
  - Never invent file contents or command output — use a tool.
  - At most one short sentence before each tool call to say what you're doing.
  - When the task is done, give a brief summary and stop. Don't pad.


log_level: "debug"
log_file: "logs/codezilla.log"

# Agent orchestration limits. These defaults match the built-in behavior and can
# be tuned per machine/model if benchmarks show looping or under-exploration.
agent:
  max_iterations: 150
  max_consecutive_failures: 5
  max_no_tool_nudges: 2
  max_consecutive_read_only_rounds: 4
  max_empty_responses: 2
  max_total_nudges: 4
  max_response_chars: 256000
  max_child_agents: 4
  max_spawn_depth: 3
  child_timeout_secs: 120
  max_child_timeout_secs: 600

# Auto-compaction: automatically summarise the conversation context after each
# turn when usage exceeds the threshold, keeping plenty of room for new work.
auto_compaction:
  enabled: true
  # Compact when context usage exceeds this % of the prompt budget (≈91k tokens).
  # 70 means compact once roughly 64k tokens are used, leaving ~27k for new work.
  threshold_pct: 70
  # Per-model overrides — larger context windows can wait longer before compacting.
  model_thresholds:
    # Anthropic models (200k context window)
    claude-opus-4-5: 80
    claude-sonnet-4-5: 80
    claude-opus-4-7: 80
    claude-sonnet-4-6: 80
    # OpenAI (128k context window)
    gpt-4o: 75
    gpt-4o-mini: 70
    # Large ollama models with big context
    qwen3-coder:480b: 72
    kimi-k2.6:cloud: 65
    # Smaller / local models — compact earlier to avoid degradation
    glm-5.1:cloud: 65
    deepseek-v4-flash:cloud: 68
