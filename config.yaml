# Codezilla Configuration
# Loaded from ./config.yaml (project root) or ~/.config/codezilla/config.yaml
# Override location: codezilla -config /path/to/config.yaml

# Model selection
model_settings:
  model_id: "glm-5.1:cloud"
  provider_id: "ollama"
  # reasoning_effort: "medium"   # low | medium | high  (Anthropic / OpenAI o-series only)

# Model presets shown in the /model autocomplete list.
# Format: model_id + provider_id required; reasoning_effort optional.
models:
  - model_id: "glm-5.1:cloud"
    provider_id: "ollama"
  - model_id: "qwen3-coder:480b"
    provider_id: "ollama"
  - model_id: "kimi-k2.6:cloud"
    provider_id: "ollama"
  - model_id: "deepseek-v4-flash:cloud"
    provider_id: "ollama"
  - model_id: "claude-opus-4-5"
    provider_id: "anthropic"
    reasoning_effort: "medium"

# LLM connection settings (API keys, provider URLs)
# API keys can also be set via environment variables:
#   OLLAMA_API_KEY, OLLAMA_BASE_URL, OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY
llm:
  ollama:
    base_url: "https://ollama.com"
    auth_type: "bearer"   # bearer | basic
    # username: ""
    # password: ""
  # openai:
  #   base_url: "https://api.openai.com/v1"
  # api_keys:
  #   ollama: ""
  #   openai: ""
  #   anthropic: ""
  #   gemini: ""

system_prompt: |
  You are Codezilla, a helpful AI coding assistant. You have access to various tools that allow you to interact with the local system, read and write files, execute commands, and more.

  When the user refers to "the project", "this project", or uses relative paths, assume they mean the current working directory and its contents. Always strive to be helpful, accurate, and safe in your responses.

  IMPORTANT RULES FOR TOOL USAGE:
  1. When the user asks to see, show, display, read, or print a file, use the fileRead tool.
  2. When the user asks to list files, explore, or scan the project, use the listFiles tool.
  3. When the user asks to run a command, use the execute tool.
  4. When the user asks to write or create a file, use the fileWrite tool.
  5. When the user asks about current events or needs up-to-date info, use the webSearch tool.
  6. For complex multi-step tasks, explain your plan step-by-step before executing.
  7. Always reply in markdown format.
  8. Be concise, accurate, and helpful.
  9. DO NOT make up file contents or command outputs — always use the appropriate tool.

log_level: "debug"
log_file: "logs/codezilla.log"
