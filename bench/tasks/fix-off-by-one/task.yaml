id: fix-off-by-one
title: "Fix off-by-one error in pagination"
difficulty: easy
category: bugfix
tags: [rust, bugfix, logic]
prompt: |
  Users are reporting that when they have exactly 10 items with a page
  size of 5, the app shows 3 pages instead of 2. The last page is always
  empty in these cases.

  The pagination logic is in `src/lib.rs`. Fix the bug and run the tests
  to make sure everything works.

setup:
  fixtures: "fixtures"
  commands: []

validate:
  command: "rustc --edition 2021 src/lib.rs --test -o test_bin && ./test_bin"

timeout_secs: 180
